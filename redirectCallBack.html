<!DOCTYPE html>
<html>
<head>
    <title>DrivePro - Redirection...</title>
</head>
<body>
    <script>
        // Plaid renvoie les infos dans l'URL (public_token, etc.)
        const urlParams = new URLSearchParams(window.location.search);
        const publicToken = urlParams.get('public_token');
        const institution = urlParams.get('institution_name') || 'Banque';

        if (publicToken) {
            // On renvoie l'utilisateur vers l'app via le schéma drivepro://
            window.location.href = `drivepro://plaid-callback?public_token=${publicToken}&institution_name=${institution}`;
        } else {
            document.body.innerHTML = "<h3>Erreur d'authentification Plaid.</h3>";
        }
    </script>
</body>
</html>
